
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>自己紹介</title>

<style>
body{
    background-color:#f0f8ff;
    font-family:Arial, sans-serif;
    text-align:center;
}

.card{
    background:white;
    width:400px;
    margin:80px auto;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    color:#2c6ed5;
}

h2{
    color:#444;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#e6f0ff;
    margin:5px;
    padding:8px;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="card">
<h1>自己紹介</h1>

<p>こんにちは！</p>
<p><strong>私の名前は たにぐち かえで です。</strong></p>

<h2>好きなこと</h2>
<ul>
<li>音楽を聞くこと</li>
<li>友達と遊ぶこと</li>
<li>勉強すること</li>
</ul>

<p>よろしくお願いします！</p>
</div>

</body>
</html>
